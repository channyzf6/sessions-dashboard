<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sessions Dashboard</title>
<script>
  // Theme bootstrap — runs before <style> parses to prevent FOUC.
  // Mirrors getInitialChoice() in data/theme.mjs. Default "current" preserves
  // the dashboard's pre-toggle appearance for users with empty localStorage.
  (() => {
    let stored = null;
    try { stored = localStorage.getItem("sessions-dashboard-theme"); } catch (_) {}
    const choice = stored === "current" || stored === "dark" || stored === "light"
      ? stored : "current";
    document.documentElement.setAttribute("data-theme", choice);
    document.documentElement.setAttribute("data-theme-choice", choice);
  })();
</script>
<style>
  :root {
    --bg: #0b1020;
    --bg-accent-1: #1a2551;
    --bg-accent-2: #331a51;
    --panel: rgba(255,255,255,.035);
    --panel-hi: rgba(255,255,255,.06);
    --surface-lo: rgba(255,255,255,.02);
    --surface-mid: rgba(255,255,255,.05);
    --border: rgba(255,255,255,.08);
    --border-strong: rgba(255,255,255,.22);
    --border-strong-hi: rgba(255,255,255,.45);
    --text: #e5ebf5;
    --dim: #8a94ad;
    --green: #4ade80;
    --red: #f87171;
    --blue: #60a5fa;
    --gold: #f5c13a;
    --violet: #c084fc;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --card-bg: rgba(0,0,0,.22);
    --card-bg-hover: rgba(255,255,255,.025);
    --card-border-hover: rgba(96,165,250,.4);
    --state-fresh-border: rgba(74,222,128,.5);
    --state-idle-border: rgba(245,193,58,.4);
    --flash-save: rgba(74,222,128,.20);
    --flash-revert: rgba(245,193,58,.20);
    --danger-tint: rgba(248,113,113,.08);
    --danger-tint-hi: rgba(248,113,113,.15);
    --danger-border: rgba(248,113,113,.4);
    --danger-border-hi: rgba(248,113,113,.6);
    --blue-tint: rgba(96,165,250,.06);
    --blue-tint-hi: rgba(96,165,250,.16);
    --blue-border-hi: rgba(96,165,250,.35);
    --blue-focus-ring: rgba(96,165,250,.55);
    --cta-text: #0b1020;
    --cta-bg-hover: #7db7ff;
    --cta-bg-tint: rgba(96,165,250,.04);
    --cta-border: rgba(96,165,250,.5);
    --cta-shadow: rgba(96,165,250,.25);
    --cta-shadow-hi: rgba(96,165,250,.4);
    --pill-running-bg: rgba(192,132,252,.14);
    --pill-running-border: rgba(192,132,252,.35);
    --pill-running-glow: rgba(192,132,252,.6);
    --pill-thinking-bg: rgba(74,222,128,.14);
    --pill-thinking-border: rgba(74,222,128,.35);
    --pill-thinking-glow: rgba(74,222,128,.6);
    --pill-idle-bg: rgba(138,148,173,.10);
    --pill-idle-border: rgba(138,148,173,.25);
    --daemon-glow: rgba(74,222,128,.35);
    --daemon-glow-dim: rgba(74,222,128,.15);
    --daemon-glow-off: rgba(248,113,113,.35);
    --locator-detached: #fb923c;
    --toast-bg: rgba(12,16,28,.95);
    --toast-shadow: rgba(0,0,0,.35);
    --toast-warn-border: rgba(245,193,58,.45);
  }
  [data-theme="dark"] {
    --bg: #06080f;
    --bg-accent-1: #131e3d;
    --bg-accent-2: #251536;
    --panel: rgba(255,255,255,.05);
    --panel-hi: rgba(255,255,255,.09);
    --surface-lo: rgba(255,255,255,.03);
    --surface-mid: rgba(255,255,255,.07);
    --border: rgba(255,255,255,.14);
    --border-strong: rgba(255,255,255,.32);
    --border-strong-hi: rgba(255,255,255,.55);
    --text: #f1f5fb;
    --dim: #98a3bd;
    --card-bg: rgba(0,0,0,.35);
    --card-bg-hover: rgba(255,255,255,.04);
    --pill-running-bg: rgba(192,132,252,.20);
    --pill-running-border: rgba(192,132,252,.50);
    --pill-thinking-bg: rgba(74,222,128,.20);
    --pill-thinking-border: rgba(74,222,128,.50);
    --pill-idle-bg: rgba(152,163,189,.14);
    --pill-idle-border: rgba(152,163,189,.32);
    --toast-bg: rgba(6,8,15,.96);
  }
  [data-theme="light"] {
    --bg: #f6f7fb;
    --bg-accent-1: #dde6ff;
    --bg-accent-2: #ecdcff;
    --panel: rgba(15,23,42,.04);
    --panel-hi: rgba(15,23,42,.08);
    --surface-lo: rgba(15,23,42,.03);
    --surface-mid: rgba(15,23,42,.06);
    --border: rgba(15,23,42,.12);
    --border-strong: rgba(15,23,42,.30);
    --border-strong-hi: rgba(15,23,42,.55);
    --text: #0f172a;
    --dim: #5b6478;
    --green: #15803d;
    --red: #b91c1c;
    --blue: #2563eb;
    --gold: #b45309;
    --violet: #7c3aed;
    --card-bg: rgba(255,255,255,.7);
    --card-bg-hover: rgba(15,23,42,.04);
    --card-border-hover: rgba(37,99,235,.4);
    --state-fresh-border: rgba(21,128,61,.55);
    --state-idle-border: rgba(180,83,9,.45);
    --flash-save: rgba(21,128,61,.18);
    --flash-revert: rgba(180,83,9,.18);
    --danger-tint: rgba(185,28,28,.08);
    --danger-tint-hi: rgba(185,28,28,.14);
    --danger-border: rgba(185,28,28,.45);
    --danger-border-hi: rgba(185,28,28,.65);
    --blue-tint: rgba(37,99,235,.08);
    --blue-tint-hi: rgba(37,99,235,.16);
    --blue-border-hi: rgba(37,99,235,.4);
    --blue-focus-ring: rgba(37,99,235,.55);
    --cta-text: #ffffff;
    --cta-bg-hover: #1d4ed8;
    --cta-bg-tint: rgba(37,99,235,.06);
    --cta-border: rgba(37,99,235,.5);
    --cta-shadow: rgba(37,99,235,.25);
    --cta-shadow-hi: rgba(37,99,235,.4);
    --pill-running-bg: rgba(124,58,237,.10);
    --pill-running-border: rgba(124,58,237,.40);
    --pill-running-glow: rgba(124,58,237,.45);
    --pill-thinking-bg: rgba(21,128,61,.10);
    --pill-thinking-border: rgba(21,128,61,.40);
    --pill-thinking-glow: rgba(21,128,61,.45);
    --pill-idle-bg: rgba(91,100,120,.08);
    --pill-idle-border: rgba(91,100,120,.25);
    --daemon-glow: rgba(21,128,61,.35);
    --daemon-glow-dim: rgba(21,128,61,.15);
    --daemon-glow-off: rgba(185,28,28,.35);
    --locator-detached: #c2410c;
    --toast-bg: rgba(248,249,253,.97);
    --toast-shadow: rgba(15,23,42,.18);
    --toast-warn-border: rgba(180,83,9,.45);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(900px 600px at 10% -10%, var(--bg-accent-1) 0%, transparent 60%),
                radial-gradient(700px 500px at 90% -20%, var(--bg-accent-2) 0%, transparent 55%),
                var(--bg);
    min-height: 100vh;
  }
  header { position: relative; padding: 1.8rem 2rem 1rem; border-bottom: 1px solid var(--border); }
  h1 { margin: 0; font-size: 1.5rem; letter-spacing: -0.02em; }
  h1 .sub { color: var(--dim); font-weight: 400; font-size: .95rem; margin-left: .6rem; }

  main { padding: 1.4rem 2rem 2rem; }

  .status-row {
    display: flex; align-items: center; gap: .8rem;
    padding: .9rem 1.1rem; margin-bottom: 1.2rem;
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  }
  .status-row .count {
    font-family: var(--mono); font-size: .82rem; color: var(--dim);
    background: var(--panel-hi); padding: .15rem .7rem; border-radius: 999px;
  }
  /* Daemon meta: labels in sans-serif, numbers in mono — less "shell prompt" */
  .status-row .daemon-info {
    margin-left: auto; font-size: .78rem; color: var(--dim);
    display: flex; align-items: center; gap: .9rem;
  }
  .status-row .daemon-info .stat { display: inline-flex; align-items: baseline; gap: .3rem; }
  .status-row .daemon-info .stat-label { color: var(--dim); opacity: .7; }
  .status-row .daemon-info .stat-value { font-family: var(--mono); color: var(--text); opacity: .85; font-size: .76rem; }
  .status-row .daemon-info .sync-ago { font-size: .72rem; color: var(--dim); opacity: .55; font-style: italic; }
  /* Ring-style daemon dot — larger, nested circles, slower pulse. Distinct
     from the session-pill dots so users don't conflate daemon liveness
     with per-session working state. */
  .status-dot {
    width: 13px; height: 13px; border-radius: 50%; display: inline-block;
    border: 2px solid var(--green); background: transparent; position: relative;
    box-shadow: 0 0 12px var(--daemon-glow);
    animation: ringPulse 3s ease-in-out infinite;
  }
  .status-dot::after {
    content: ""; position: absolute; inset: 2.5px; border-radius: 50%;
    background: var(--green);
  }
  .status-dot.offline {
    border-color: var(--red); box-shadow: 0 0 12px var(--daemon-glow-off);
    animation: none;
  }
  .status-dot.offline::after { background: var(--red); }
  @keyframes ringPulse { 50% { box-shadow: 0 0 4px var(--daemon-glow-dim); } }

  .sessions-list {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: .7rem; margin: 0; padding: 0; list-style: none;
  }
  /* Subtle color wash so the group's identity extends beyond the 3px stripe —
     a soft tint at the top that fades out within the first ~30% of height. */
  .group-section {
    margin-bottom: 1rem; padding: .3rem .3rem 0; border-radius: 10px;
    background: linear-gradient(to bottom, var(--group-tint, transparent), transparent 35%);
  }
  .group-header {
    display: flex; align-items: center; gap: .7rem;
    padding: .55rem .9rem; margin-bottom: .55rem;
    background: var(--surface-lo); border: 1px solid var(--border);
    border-left: 3px solid var(--group-color, var(--dim));
    border-radius: 8px;
  }
  .group-header .name {
    font-weight: 600; font-size: .95rem; letter-spacing: -0.01em;
    background: transparent; color: var(--text); border: none; outline: none;
    padding: .15rem .25rem; border-radius: 4px; min-width: 2ch;
    font-family: inherit;
    /* Persistent dotted underline reads as "editable text" without needing
       hover discovery. Removed while focused so the edit state feels clean. */
    text-decoration: underline dotted var(--border-strong);
    text-underline-offset: 3px;
    transition: background .4s ease, text-decoration-color .15s ease;
  }
  .group-header .name:hover {
    background: var(--surface-mid); cursor: text;
    text-decoration-color: var(--border-strong-hi);
  }
  .group-header .name:focus {
    background: var(--border);
    text-decoration: none;
  }
  /* The Ungrouped section's name is a static label, not editable. */
  .group-header .name.static {
    text-decoration: none; cursor: default;
  }
  .group-header .name.static:hover { background: transparent; }
  /* Brief save/revert feedback flashes on the name after blur. */
  .group-header .name.flash-save { background: var(--flash-save); }
  .group-header .name.flash-revert { background: var(--flash-revert); }
  /* Inline count: no pill — just dim text with a separator dot. Reduces
     vocabulary overlap with the daemon-level "X sessions" pill. */
  .group-header .count {
    font-size: .78rem; color: var(--dim); opacity: .7;
    font-family: inherit;
  }
  .group-header .count::before { content: "· "; opacity: .6; }
  .group-header .actions { margin-left: auto; display: flex; gap: .35rem; }
  .group-header .btn {
    background: transparent; border: 1px solid var(--border); color: var(--dim);
    font: inherit; font-size: .72rem; padding: .2rem .55rem; border-radius: 6px;
    cursor: pointer;
  }
  .group-header .btn:hover { color: var(--text); border-color: var(--border-strong); }
  .group-header .btn.delete:hover { color: var(--red); border-color: var(--danger-border); }
  .group-header .btn.delete.armed {
    color: var(--red); border-color: var(--danger-border-hi);
    background: var(--danger-tint);
    animation: armedPulse 1.2s ease-in-out infinite;
  }
  @keyframes armedPulse { 50% { background: var(--danger-tint-hi); } }
  .group-drop {
    min-height: 48px; padding: .4rem; border-radius: 10px;
    border: 1px dashed transparent;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem; list-style: none; margin: 0;
    transition: background .15s ease, border-color .15s ease;
  }
  .group-drop.empty { border-color: var(--border); color: var(--dim); font-style: italic; align-items: center; justify-content: center; display: flex; padding: 1rem; }
  .group-drop.drag-over { background: var(--blue-tint); border-color: var(--blue-border-hi); border-style: dashed; }
  /* Smaller ghost button, right-aligned; no longer competing with
     drop-zone placeholders for visual weight. */
  .new-group-btn-wrap {
    display: flex; justify-content: flex-end; margin-top: .4rem;
  }
  .new-group-btn {
    background: transparent; border: 1px solid var(--border); color: var(--dim);
    font: inherit; font-size: .78rem; padding: .35rem .8rem; border-radius: 6px;
    cursor: pointer; width: auto;
    transition: color .15s, border-color .15s, background .15s, box-shadow .2s;
  }
  .new-group-btn:hover { color: var(--text); border-color: var(--cta-border); background: var(--cta-bg-tint); }
  /* Primary CTA treatment: promoted when there are no groups yet AND at
     least one session is live — giving new users one obvious thing to click.
     Reverts to the ghost style as soon as a group exists. */
  .new-group-btn.primary {
    color: var(--cta-text); background: var(--blue); border-color: var(--blue);
    font-weight: 600; padding: .45rem 1rem;
    box-shadow: 0 2px 10px var(--cta-shadow);
  }
  .new-group-btn.primary:hover {
    background: var(--cta-bg-hover); border-color: var(--cta-bg-hover); color: var(--cta-text);
    box-shadow: 0 2px 14px var(--cta-shadow-hi);
  }
  /* Empty state: zero sessions AND zero groups. */
  .empty-state {
    text-align: center; padding: 3rem 1rem; color: var(--dim);
  }
  .empty-state .icon {
    font-size: 2rem; opacity: .4; margin-bottom: .8rem;
  }
  .empty-state h2 {
    margin: 0 0 .4rem; color: var(--text); font-size: 1.05rem; font-weight: 600;
    letter-spacing: -0.01em;
  }
  .empty-state p {
    margin: 0 auto; max-width: 420px; font-size: .85rem; line-height: 1.5;
  }
  .empty-state code {
    font-family: var(--mono); font-size: .82rem;
    background: var(--panel-hi); padding: .1rem .4rem; border-radius: 4px;
    color: var(--text);
  }
  /* Two-row card. Card itself is a flex-row so the status pill can sit
     vertically centered across both inner rows. Host is exposed only via
     the card tooltip — no color stripe (the group section's own accent
     already owns the left-edge color channel; a per-card stripe would
     stack against it and turn the dashboard chromatic). */
  .session {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .85rem 1.05rem;
    font-family: ui-sans-serif, system-ui, sans-serif; font-size: .85rem;
    display: flex; flex-direction: row; align-items: center; gap: .9rem;
    transition: border-color .25s ease, transform .1s ease, opacity .15s ease, background .15s ease;
    cursor: grab;
  }
  .session:active { cursor: grabbing; }
  .session.dragging { opacity: .45; }
  .session:hover {
    transform: translateY(-1px);
    background: var(--card-bg-hover);
    border-color: var(--card-border-hover);
  }
  .session.fresh { border-color: var(--state-fresh-border); }
  .session.idle  { border-color: var(--state-idle-border); opacity: .9; }

  /* .body stacks ident + optional locator vertically. Takes all leftover
     horizontal space so the locator has room for long cwd/branch values. */
  .session .body {
    flex: 1 1 auto; min-width: 0;
    display: flex; flex-direction: column; gap: .35rem;
  }

  /* Primary identifier. Named sessions use heavier weight + full-text
     color; unnamed cwd-fallback uses dim + medium weight. No hue
     difference — saves a color, keeps "named vs not" as weight alone. */
  .session .ident {
    color: var(--dim); font-weight: 500;
    font-size: .95rem; letter-spacing: -.005em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0;
  }
  .session .ident.named { color: var(--text); font-weight: 600; }

  /* Locator row: dim mono, full width of .body. No flex contention with
     the status pill so even long "<cwd>/<branch>" values breathe.
     Detached HEAD flips to orange italic — a legitimate state warning,
     not decoration. */
  .session .locator {
    color: var(--dim); font-family: var(--mono); font-size: .76rem;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    opacity: .9; letter-spacing: .01em;
  }
  .session .locator.detached { color: var(--locator-detached); font-style: italic; }
  /* Branch glyph — bumped a tick over the locator's base size so the
     ⎇ reads clearly at small sizes on every font stack. Slight opacity
     boost over the rest of the dim locator so it's the visual anchor. */
  .session .locator .branch-glyph {
    font-size: .95rem;
    opacity: 1;
    vertical-align: -1px;
    /* Asymmetric: wider gap before the glyph (detaches it from the cwd)
       and a tighter gap after so ⎇ visually belongs to the branch name
       that follows it. */
    margin-left: .5rem;
    margin-right: .18rem;
  }

  /* Status pill: the card's only color accent. flex-shrink:0 keeps it
     whole at the right edge; align-items:center on .session vertically
     centers it between row 1 and row 2. */
  .session .status {
    flex-shrink: 0;
    font-size: .72rem; font-weight: 600;
    padding: .2rem .65rem; border-radius: 999px; white-space: nowrap;
    display: inline-flex; align-items: center; gap: .4rem;
    font-family: ui-sans-serif, system-ui, sans-serif;
  }
  .session .status .dot {
    width: 6px; height: 6px; border-radius: 50%; display: inline-block;
  }
  /* "running <tool>.." — tool is dispatched, session is waiting on the tool.
     Violet conveys "agent is parked until the tool returns". */
  .session .status.running {
    background: var(--pill-running-bg); color: var(--violet);
    border: 1px solid var(--pill-running-border);
  }
  .session .status.running .dot {
    background: var(--violet);
    box-shadow: 0 0 6px var(--pill-running-glow);
    animation: statusPulse 2.2s ease-in-out infinite;
  }
  /* "working" — assistant itself is producing output (text / tool-call
     dispatch / thinking tokens). Green = agent is actively doing work. The
     legacy `.status.working` fallback for pre-tail-state proxies reuses the
     same palette — closest semantic match to the old binary pill. */
  .session .status.thinking,
  .session .status.working {
    background: var(--pill-thinking-bg); color: var(--green);
    border: 1px solid var(--pill-thinking-border);
  }
  .session .status.thinking .dot,
  .session .status.working .dot {
    background: var(--green);
    box-shadow: 0 0 6px var(--pill-thinking-glow);
    animation: statusPulse 1.6s ease-in-out infinite;
  }
  .session .status.idle {
    background: var(--pill-idle-bg); color: var(--dim);
    border: 1px solid var(--pill-idle-border);
    font-weight: 500;
  }
  .session .status.idle .dot {
    background: var(--dim); opacity: .6;
  }
  @keyframes statusPulse { 50% { opacity: .45; } }
  .session.empty {
    color: var(--dim); font-style: italic;
    align-items: center; justify-content: center; padding: 1.4rem;
    border-style: dashed; grid-column: 1 / -1;
  }

  footer { padding: 1rem 2rem; border-top: 1px solid var(--border); color: var(--dim); font-size: .78rem; }

  /* Focus-terminal button — icon-only, sits between the card body and
     status pill. Subtle at rest; brightens on hover so it reads as
     interactive without competing with the pill. Active-click pulse
     gives instant feedback before the async response lands. */
  .session .focus-btn {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid transparent;
    color: var(--dim);
    cursor: pointer;
    font: inherit; font-size: 1rem; line-height: 1;
    padding: .3rem .42rem; border-radius: 6px;
    opacity: .55;
    transition: opacity .15s, color .15s, border-color .15s, background .15s;
  }
  .session:hover .focus-btn { opacity: .9; }
  .session .focus-btn:hover {
    color: var(--blue); border-color: var(--blue-border-hi);
    background: var(--blue-tint); opacity: 1;
  }
  .session .focus-btn:focus-visible {
    outline: 2px solid var(--blue-focus-ring); outline-offset: 1px;
  }
  .session .focus-btn.focus-btn-active {
    color: var(--blue); background: var(--blue-tint-hi); opacity: 1;
  }

  /* Transient toast for focus errors (and future use). Positioned fixed
     so it doesn't re-layout the grid when it appears. */
  .toast {
    position: fixed;
    bottom: 1.2rem; left: 50%; transform: translateX(-50%) translateY(.6rem);
    background: var(--toast-bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: .55rem .85rem; font-size: .82rem; max-width: 32rem;
    box-shadow: 0 10px 30px var(--toast-shadow);
    opacity: 0; pointer-events: none;
    transition: opacity .18s ease, transform .18s ease;
    z-index: 1000;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.toast-warn { border-color: var(--toast-warn-border); color: var(--gold); }

  /* Theme toggle: single cycling button, top-right of the header.
     Glyph reflects the current mode; click cycles current → dark → light. */
  .theme-toggle {
    position: absolute; top: 1.4rem; right: 1.4rem; z-index: 1;
    background: var(--panel-hi); color: var(--text);
    border: 1px solid var(--border); border-radius: 999px;
    width: 30px; height: 30px; padding: 0;
    font-size: 14px; line-height: 1; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .15s ease, border-color .15s ease, color .15s ease;
  }
  .theme-toggle:hover {
    background: var(--blue-tint); border-color: var(--blue-border-hi);
  }
  .theme-toggle:focus-visible {
    outline: 2px solid var(--blue-focus-ring); outline-offset: 2px;
  }
</style>
</head>
<body>
<header>
  <h1>Connected sessions <span class="sub">— live view of every agentic CLI session you're running</span></h1>
  <button id="theme-toggle" type="button" class="theme-toggle"
          title="Theme: Current (click to cycle)"
          aria-label="Theme: Current. Click to cycle theme."></button>
</header>
<main>
  <div class="status-row">
    <span class="status-dot" id="daemon-dot"></span>
    <span class="count" id="sessions-count">—</span>
    <span class="daemon-info" id="daemon-info">—</span>
  </div>
  <div id="groups-container"></div>
  <div id="new-group-wrap" class="new-group-btn-wrap">
    <button id="new-group-btn" class="new-group-btn" type="button">+ New group</button>
  </div>
</main>
<footer>Polls <code>http://127.0.0.1:8787/sessions</code> every 2 s. Drag session cards between groups to organize them; groups persist across daemon restarts.</footer>

<script>
(() => {
  const DAEMON_BASE = "http://127.0.0.1:8787";
  const countEl = document.getElementById("sessions-count");
  const dotEl = document.getElementById("daemon-dot");
  const infoEl = document.getElementById("daemon-info");
  const groupsContainer = document.getElementById("groups-container");
  const newGroupBtn = document.getElementById("new-group-btn");
  const newGroupWrap = document.getElementById("new-group-wrap");

  // Palette for auto-assigned group colors (cycles when all are used).
  const COLORS = ["#60a5fa", "#4ade80", "#c084fc", "#f5c13a", "#f87171", "#38bdf8", "#fb923c", "#a3e635"];

  // Magic numbers gathered in one place for easy tuning.
  const TIMINGS = {
    pollIntervalMs: 2000,
    armedWindowMs: 5000,
    freshThresholdMs: 6000,
    writeSettleMs: 500,
    // Suppress rename reconciliation for sessions younger than this. Adapter
    // name-discovery has discovery jitter in the first seconds (e.g. a host
    // adapter may briefly resolve to the wrong transcript before stabilizing);
    // reacting to those flips with pin writes locks cards into wrong groups.
    // Defense-in-depth — sticky JSONL binding in lib/host/claude.mjs is the
    // primary fix; this just stops the dashboard from amplifying any future
    // flap regression.
    renameDebounceMs: 30000,
  };

  // Local copies of the latest daemon state.
  let sessionsState = [];
  let groupsState = [];
  // Per-session-id overrides of group-rule matching. A pin wins over members
  // rules — it's how we pick one session out of a cohort that shares a cwd.
  // Shape: [{ sessionId, groupId: string | null }] where null = Ungrouped.
  let pinsState = [];
  let daemonState = null;

  // Suppress re-render while the user is mid-drag so DOM churn doesn't
  // disrupt the drag. Set on dragstart, cleared on dragend.
  let isDragging = false;
  // Same idea but for the press-before-drag window: as soon as mousedown
  // lands on a card we pause polling. Without this, a coinciding in-place
  // metadata update (e.g. "14 calls · last 1s ago" on the active session)
  // swaps the text node under the cursor and Chromium cancels the drag.
  let isMouseDownOnCard = false;
  // Timestamp of the last PUT to /session-groups. Polls within the settle
  // window get skipped so we don't flash server state back over our local
  // mutation before the server has acknowledged it.
  let lastWriteAt = 0;
  // Timestamp of the most recent successful poll — drives the "synced Xs ago"
  // staleness indicator so users can tell the dashboard is live.
  let lastPollOkAt = 0;
  // Last server-confirmed snapshots (JSON strings) for rollback on save
  // failure. Updated on every successful poll and every successful PUT ack.
  // A failed PUT restores groupsState/pinsState from these — we can't use
  // a local snapshot taken inside doSaveGroups because by that point the
  // caller has already applied the optimistic mutation.
  let lastSyncedGroups = "[]";
  let lastSyncedPins = "[]";
  // Per session.id → last-observed sessionName. Drives rename detection
  // between polls so we can keep cards from jumping groups when a user
  // /renames their session — see detectRenames() and
  // reconcileRenamedSession() further down.
  const lastSeenSessionNames = new Map();
  // Delete buttons are armed per-group (two-click confirm). Tracking the
  // armed set at module scope rather than via per-button closures means
  // re-renders (e.g. after a drop) don't orphan pending timers.
  const armedGroupIds = new Set();

  // Global mouseup fallback so we don't get stuck if the user presses on a
  // card and releases outside it.
  document.addEventListener("mouseup", () => { isMouseDownOnCard = false; });

  // Blur a focused group-name field when the user clicks outside it. Without
  // this, the field stays focused indefinitely after a "+ New group" click +
  // walk-away, deferring the structural rebuild forever. Pointerdown (not
  // click) so we beat the natural focus transfer.
  document.addEventListener("pointerdown", (e) => {
    const editing = document.activeElement;
    if (!editing || !editing.classList?.contains("name") || !editing.isContentEditable) return;
    if (editing.contains(e.target)) return; // click inside the editing field — leave focus alone
    editing.blur();
  });

  function basename(p) {
    if (!p) return "—";
    const parts = String(p).split(/[\\/]/).filter(Boolean);
    return parts.length >= 2 ? parts.slice(-2).join("/") : parts.join("/") || p;
  }

  // Final path segment only — used inside the locator where we compose
  // "<cwd>/<branch>" and an extra parent-dir slash would read ambiguously
  // (is `.../sessions-dashboard/card-redesign` a subdir path or a branch?).
  function basenameLast(p) {
    if (!p) return "—";
    const parts = String(p).split(/[\\/]/).filter(Boolean);
    return parts[parts.length - 1] || p;
  }

  // Host label — shown in the card tooltip. Currently no visible host
  // affordance on the card itself (the card-redesign PR removed the
  // colored left-stripe that fought with group colors). The card sets
  // `data-host` on its <li> so any future CSS rule can re-introduce a
  // visible host signal without a code change.
  function hostLabel(h) {
    if (h === "gemini") return "Gemini CLI";
    if (h === "codex")  return "Codex CLI";
    if (h === "claude") return "Claude Code";
    return "unknown host";
  }

  // Composite card tooltip — surfaces fields demoted from visible chrome
  // (pid, full cwd, uptime, host label, session id). Shared between
  // renderSessionCard and updateCardInPlace so the two paths can't drift.
  function buildCardTooltip(s) {
    return [
      s.sessionName || null,
      s.cwd || null,
      s.pid != null ? `pid ${s.pid}` : null,
      `up ${fmtAge(s.ageMs)}`,
      hostLabel(s.host),
      s.id ? `session ${s.id}` : null,
    ].filter(Boolean).join("\n");
  }

  // Transient toast near the bottom of the viewport. Used for focus errors
  // where we need to surface the pid so the user can Cmd-Tab manually.
  // Only one toast visible at a time; new calls replace the previous one.
  let _toastTimer = null;
  function showToast(text, kind) {
    let t = document.getElementById("toast");
    if (!t) {
      t = document.createElement("div");
      t.id = "toast";
      document.body.append(t);
    }
    t.textContent = text;
    t.className = "toast show" + (kind ? " toast-" + kind : "");
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => { t.className = "toast"; }, 3500);
  }

  // Format a gitBranch payload ({branch, sha, detached} | null) for display.
  // Returns null if the session isn't in a git repo (caller omits the cell).
  function formatGitBranch(gb) {
    if (!gb || typeof gb !== "object") return null;
    if (gb.detached && gb.sha) {
      return { text: "(" + gb.sha + ")", title: "detached at " + gb.sha, detached: true };
    }
    if (gb.branch) {
      return { text: gb.branch, title: "refs/heads/" + gb.branch, detached: false };
    }
    return null;
  }

  // Build the "where am I working" locator — a single compound string that
  // collapses cwd and branch into one token. Return { text, title, detached }
  // or null when the session has neither cwd-to-show nor a branch.
  //
  // - Named session in a repo on a branch:     "repos_llm/main"
  // - Named session in a repo, detached HEAD:  "repos_llm (a1b2c3d)"
  // - Named session, no repo:                  "repos_llm"
  // - Unnamed session, on a branch:            "main"  (cwd already shown as ident)
  // - Unnamed session, detached:               "(a1b2c3d)"
  // - Unnamed session, no repo:                null (ident already carries cwd)
  // U+2387 "alternative key symbol" — the de facto git-branch glyph used
  // in prompt themes (Starship, p10k, oh-my-zsh agnoster). Disambiguates
  // the branch name from any '/' that might appear in the cwd basename.
  const BRANCH_GLYPH = "⎇";

  // Paint locator text into an element, wrapping the branch glyph in its
  // own span so CSS can style it (larger, brighter). Idempotent — safe
  // to call on an already-populated element.
  function applyLocatorText(el, text) {
    el.textContent = "";
    const i = text.indexOf(BRANCH_GLYPH);
    if (i === -1) { el.textContent = text; return; }
    // Pre-glyph segment (trim trailing space since the span has its own margin).
    const before = text.slice(0, i).replace(/\s+$/, "");
    const after = text.slice(i + BRANCH_GLYPH.length).replace(/^\s+/, "");
    if (before) el.append(document.createTextNode(before));
    const g = document.createElement("span");
    g.className = "branch-glyph";
    g.textContent = BRANCH_GLYPH;
    el.append(g);
    if (after) el.append(document.createTextNode(after));
  }

  function buildLocator(s) {
    // Only include the cwd portion when both sessionName AND cwd exist —
    // otherwise basenameLast would return "—" and we'd render a stray em-dash.
    const cwdShown = (s.sessionName && s.cwd) ? basenameLast(s.cwd) : null;
    const gb = formatGitBranch(s.gitBranch);
    if (!cwdShown && !gb) return null;
    if (cwdShown && gb && !gb.detached) {
      return { text: cwdShown + " " + BRANCH_GLYPH + " " + gb.text, title: (s.cwd || "") + "\n" + gb.title };
    }
    if (cwdShown && gb && gb.detached) {
      return { text: cwdShown + " " + gb.text, title: (s.cwd || "") + "\n" + gb.title, detached: true };
    }
    if (cwdShown) return { text: cwdShown, title: s.cwd || "" };
    return { text: gb.text, title: gb.title, detached: !!gb.detached };
  }

  // Context-window sizes for known Claude models. The proxy reports model as
  // it appears in the CC JSONL (e.g. "claude-opus-4-7[1m]"). Unknown models
  // fall back to 200K — if the fallback is triggered, the label shows "?" so
  // the user knows the percentage is approximate.
  // "Working" = last tool call within this window; beyond it, the session is
  // considered idle and the card surfaces how long it's been idle.
  const WORKING_THRESHOLD_MS = 60_000;

  // Format an idle duration in minutes / hours (never seconds — transient
  // sub-minute gaps happen mid-turn and aren't useful to surface).
  function fmtIdleDuration(ms) {
    const totalMin = Math.floor(ms / 60_000);
    if (totalMin < 1) return "idle <1m";
    if (totalMin < 60) return `idle ${totalMin}m`;
    const h = Math.floor(totalMin / 60);
    const mr = totalMin % 60;
    return mr ? `idle ${h}h ${mr}m` : `idle ${h}h`;
  }

  // Prettify the raw tool name from the JSONL for display in the pill.
  //   mcp__sessions-dashboard__screenshot → sessions-dashboard·screenshot
  //   Bash                      → bash
  function prettifyToolName(raw) {
    if (!raw) return "";
    if (raw.startsWith("mcp__")) {
      const parts = raw.slice(5).split("__");
      return parts.join("·").toLowerCase();
    }
    return raw.toLowerCase();
  }

  // Derive a session's 3-state activity status from the tail-state fields
  // reported by the proxy. Legacy sessions (old proxy with no activityState)
  // fall back to the pre-existing working-if-tool-call-within-60s heuristic
  // so they still render during rollout.
  function deriveStatus(s) {
    if (s.activityState == null) {
      // Legacy fallback — drop once all proxies are migrated.
      if (s.lastCallAgoMs != null && s.lastCallAgoMs < WORKING_THRESHOLD_MS) {
        return { kind: "running", label: "working" };
      }
      return { kind: "idle", label: fmtIdleDuration(s.lastCallAgoMs ?? s.ageMs ?? 0) };
    }
    if (s.activityState === "running") {
      const t = prettifyToolName(s.toolName);
      return { kind: "running", label: t ? "running " + t + ".." : "running.." };
    }
    if (s.activityState === "thinking") {
      // Label reads "working" (more accurate: Claude is actively producing
      // output — text, thinking tokens, or a tool call about to be dispatched
      // — we just can't see which from the JSONL until it lands). The CSS
      // class stays `thinking` so the violet pulsing style still applies.
      return { kind: "thinking", label: "working" };
    }
    // idle — prefer time since last state change; fall back to lastCallAgoMs
    // or ageMs for sessions that predate stateChangedAt.
    const sinceMs = s.stateChangedAgoMs != null
      ? s.stateChangedAgoMs
      : (s.lastCallAgoMs ?? s.ageMs ?? 0);
    return { kind: "idle", label: fmtIdleDuration(sinceMs) };
  }

  function buildStatusPill(s) {
    const { kind, label } = deriveStatus(s);
    const pill = document.createElement("span");
    pill.className = "status " + kind;
    const dot = document.createElement("span"); dot.className = "dot";
    const txt = document.createElement("span"); txt.textContent = label;
    pill.append(dot, txt);
    return pill;
  }
  function fmtAge(ms) {
    if (ms == null || ms < 0) return "—";
    const s = Math.floor(ms / 1000);
    if (s < 60) return s + "s";
    const m = Math.floor(s / 60); if (m < 60) return m + "m " + (s % 60) + "s";
    const h = Math.floor(m / 60); return h + "h " + (m % 60) + "m";
  }
  function uid() { return "grp_" + Math.random().toString(36).slice(2, 10); }

  // Convert a hex color like "#60a5fa" to an rgba() string at the given alpha.
  // Used to tint a group section's background with a faint wash matching its
  // left-stripe color.
  function hexToRgba(hex, alpha) {
    if (!hex || typeof hex !== "string" || !hex.startsWith("#") || hex.length < 7) {
      return "transparent";
    }
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    if (Number.isNaN(r) || Number.isNaN(g) || Number.isNaN(b)) return "transparent";
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  }

  // Serialize PUTs to /session-groups so two rapid drags can't race each
  // other on the network. Each call appends to a chain; the chain's tail
  // holds the last-submitted snapshot as the authoritative write.
  let saveChain = Promise.resolve();
  function saveGroups() {
    saveChain = saveChain.then(() => doSaveGroups());
    // Callers don't await — the chain runs in the background.
    saveChain.catch(() => {});
    return saveChain;
  }

  async function doSaveGroups() {
    // Suppress polls while the PUT is in flight so stale server state can't
    // overwrite our optimistic local mutation mid-request.
    lastWriteAt = Date.now();
    // Garbage-collect pins whose session is no longer connected. We only
    // prune when sessionsState is non-empty so a transient empty-sessions
    // read (e.g. daemon restart) doesn't nuke all pins. Pins for the live
    // set stay; stale ones are dropped to bound the file size.
    if (sessionsState.length > 0) {
      const liveIds = new Set(sessionsState.map((s) => s.id));
      pinsState = pinsState.filter((p) => liveIds.has(p.sessionId));
    }
    // Capture the payload we're about to send so we can mark lastSynced to
    // exactly what the server accepted (current in-memory state may drift
    // further by the time the PUT completes if more mutations queue behind
    // us on saveChain).
    const sendGroups = JSON.stringify(groupsState);
    const sendPins = JSON.stringify(pinsState);
    let ok = false;
    try {
      const res = await fetch(DAEMON_BASE + "/session-groups", {
        method: "PUT",
        headers: { "content-type": "application/json" },
        body: `{"groups":${sendGroups},"pins":${sendPins}}`,
      });
      ok = res.ok;
      if (!ok) {
        const t = await res.text().catch(() => "");
        console.error("save groups failed", res.status, t);
      }
    } catch (e) {
      console.error("save groups error", e);
    }
    if (ok) {
      // Extend the settle window so the next poll gets the server's echo.
      lastWriteAt = Date.now();
      lastSyncedGroups = sendGroups;
      lastSyncedPins = sendPins;
    } else {
      // Roll back to the last server-confirmed state so the failed
      // optimistic mutation doesn't linger and re-PUT on the next save.
      try {
        groupsState = JSON.parse(lastSyncedGroups);
        pinsState = JSON.parse(lastSyncedPins);
      } catch {}
      lastWriteAt = 0;
      render();
    }
  }

  // Move a session into the target group (or to Ungrouped when targetGroupId
  // is null). Returns true if anything changed.
  //
  // Drag writes a per-session-id pin rather than mutating cwd member rules.
  // Pins override rule-based matching, which cleanly solves the "cwd rule
  // can't distinguish sessions sharing a cwd" problem that member-mutation
  // approaches kept tripping on. cwd rules stay intact so unaffected cohort
  // mates don't get kicked out of their group.
  //
  // Pins are keyed on session.id (daemon-assigned, stable for the session's
  // registered lifetime). On next launch the id is new and the pin no longer
  // applies — the session falls through to rule-based matching.
  //
  // For NAMED sessions we additionally sync a sessionName rule so grouping
  // survives CC restarts (pin gone, rule still matches). sessionName is
  // session-specific so these rules never cause cohort contamination.
  function assignSessionToGroup(session, targetGroupId) {
    if (!session || !session.id) return false;
    const desiredGroupId = targetGroupId || null;
    let changed = false;

    // Upsert the pin.
    const existing = pinsState.find((p) => p.sessionId === session.id);
    if (!existing || existing.groupId !== desiredGroupId) {
      pinsState = pinsState.filter((p) => p.sessionId !== session.id);
      pinsState.push({ sessionId: session.id, groupId: desiredGroupId });
      changed = true;
    }

    // Sync sessionName rule so the grouping persists across CC restarts.
    // Goal: the rule for this sessionName exists only in the target group
    // (or in no group, if target is Ungrouped).
    if (session.sessionName) {
      const name = session.sessionName;
      for (const g of groupsState) {
        const shouldKeep = g.id === desiredGroupId;
        const hasRule = g.members.some((m) => m.key === "sessionName" && m.value === name);
        if (shouldKeep && !hasRule) {
          g.members.push({ key: "sessionName", value: name });
          changed = true;
        } else if (!shouldKeep && hasRule) {
          g.members = g.members.filter((m) => !(m.key === "sessionName" && m.value === name));
          changed = true;
        }
      }
    }

    return changed;
  }

  // Where a session would be bucketed by member rules alone (no pins).
  // sessionName rules (specific) win over cwd rules (cohort-shared).
  // Optional `nameOverride` substitutes for `session.sessionName` —
  // used by reconcileRenamedSession to ask "where would this session
  // have been bucketed under its OLD name?" without mutating state.
  function resolveRuleGroupId(session, nameOverride) {
    const name = nameOverride !== undefined ? nameOverride : session.sessionName;
    if (name) {
      for (const g of groupsState) {
        for (const m of g.members || []) {
          if (m.key === "sessionName" && m.value === name) return g.id;
        }
      }
    }
    if (session.cwd) {
      for (const g of groupsState) {
        for (const m of g.members || []) {
          if (m.key === "cwd" && m.value === session.cwd) return g.id;
        }
      }
    }
    return null;
  }

  // Spot sessions whose sessionName changed since the last successful
  // poll. Without this, a /rename quietly invalidates the sessionName
  // rule that was placing the card and the card jumps to whichever
  // other group happens to have a stale rule for the new name (or to
  // Ungrouped if no rule matches). Also updates the per-session map
  // so the next poll has the new baseline. First-observed sessions
  // (previousName is undefined) are NOT treated as renames.
  //
  // Sessions younger than renameDebounceMs are exempt from reconciliation
  // — see TIMINGS comment. We still track the latest name so comparisons
  // after the debounce window have an accurate baseline.
  function detectRenames() {
    const renames = [];
    const liveIds = new Set();
    for (const s of sessionsState) {
      liveIds.add(s.id);
      const previousName = lastSeenSessionNames.get(s.id);
      lastSeenSessionNames.set(s.id, s.sessionName);
      if (previousName && previousName !== s.sessionName) {
        if (typeof s.ageMs === "number" && s.ageMs < TIMINGS.renameDebounceMs) continue;
        renames.push({ session: s, oldName: previousName });
      }
    }
    // GC entries for sessions that have disappeared.
    for (const id of [...lastSeenSessionNames.keys()]) {
      if (!liveIds.has(id)) lastSeenSessionNames.delete(id);
    }
    return renames;
  }

  // Reconcile rules + pins so a renamed session stays in its current
  // group. Called for each rename detected in detectRenames().
  //
  // Three things happen:
  //   1. If the bucketing WOULD change AND no pin already protects
  //      the session, write a pin to the OLD group. Pins are keyed
  //      on session.id (stable across rename) and override rule
  //      lookup, so this guarantees the card stays put for the rest
  //      of the current session run.
  //   2. Update the matching sessionName rule in the OLD group from
  //      oldName -> newName. Preserves grouping across CLI restarts:
  //      after restart the pin is gone (new session.id), but the
  //      updated rule still matches the new name and re-buckets the
  //      session into the same group. If newName already had a rule
  //      in that group, drop the stale duplicate.
  //   3. Scrub stale rules for oldName from OTHER groups, but only
  //      if no live session still uses oldName. This cleans up rule
  //      pollution that used to accumulate across renames (every
  //      drag added a sessionName rule; nothing ever removed them).
  //      Conditional cleanup avoids displacing a different live
  //      session that happens to share the old name.
  //
  // Returns true if anything in groupsState/pinsState changed (the
  // caller saves to /session-groups in that case).
  function reconcileRenamedSession(session, oldName) {
    const newName = session.sessionName;
    const oldGroupId = resolveRuleGroupId(session, oldName);
    const newGroupId = resolveRuleGroupId(session, newName);
    let changed = false;

    if (oldGroupId !== newGroupId) {
      const existingPin = pinsState.find((p) => p.sessionId === session.id);
      if (!existingPin) {
        pinsState.push({ sessionId: session.id, groupId: oldGroupId });
        changed = true;
      }
    }

    if (oldGroupId) {
      const g = groupsState.find((gg) => gg.id === oldGroupId);
      if (g) {
        const idx = g.members.findIndex(
          (m) => m.key === "sessionName" && m.value === oldName,
        );
        if (idx >= 0) {
          if (!newName) {
            // Renamed away from a name to nameless — remove the rule
            // rather than rewriting it to `value: null` (which would be a
            // malformed rule that never matches anything anyway).
            g.members.splice(idx, 1);
          } else {
            const newAlreadyHasRule = g.members.some(
              (m) => m.key === "sessionName" && m.value === newName,
            );
            if (newAlreadyHasRule) {
              g.members.splice(idx, 1);
            } else {
              g.members[idx] = { key: "sessionName", value: newName };
            }
          }
          changed = true;
        }
      }
    }

    const oldNameStillInUse = sessionsState.some((s) => s.sessionName === oldName);
    if (!oldNameStillInUse) {
      for (const g of groupsState) {
        if (g.id === oldGroupId) continue;
        const before = g.members.length;
        g.members = g.members.filter(
          (m) => !(m.key === "sessionName" && m.value === oldName),
        );
        if (g.members.length !== before) changed = true;
      }
    }

    return changed;
  }

  function renderSessionCard(s) {
    const li = document.createElement("li");
    li.className = "session " + (s.lastSeenAgoMs < TIMINGS.freshThresholdMs ? "fresh" : "idle");
    li.draggable = true;
    li.dataset.sessionId = s.id || "";
    li.dataset.cwd = s.cwd || "";
    li.dataset.sessionName = s.sessionName || "";
    li.dataset.host = s.host || "claude";

    // Two-row card. .body stacks ident (top) + locator (below). Status
    // pill sits as a sibling and is vertically centered between the two
    // rows via .session's align-items:center. Host is tooltip-only — no
    // visible color stripe, so the group section's color stripe can be
    // the only left-edge signal in the view.
    const body = document.createElement("div"); body.className = "body";

    const ident = document.createElement("span"); ident.className = "ident";
    if (s.sessionName) {
      ident.classList.add("named");
      ident.textContent = s.sessionName;
    } else {
      ident.textContent = basename(s.cwd);
    }
    body.append(ident);

    const loc = buildLocator(s);
    if (loc) {
      const el = document.createElement("span"); el.className = "locator";
      if (loc.detached) el.classList.add("detached");
      applyLocatorText(el, loc.text);
      el.title = loc.title;
      body.append(el);
    }

    li.append(body);
    // Focus-terminal button — only when the daemon advertises the capability
    // (macOS only). Icon-only; sits between the body and the status pill so
    // it's visually balanced and vertically centered by .session's flex.
    if (daemonState?.capabilities?.focus) {
      const focusBtn = document.createElement("button");
      focusBtn.type = "button";
      focusBtn.className = "focus-btn";
      focusBtn.setAttribute("aria-label", "Focus this session's terminal");
      focusBtn.title = "Focus this session's terminal tab";
      focusBtn.textContent = "↗";
      focusBtn.draggable = false;
      // Swallow pointer events so the click doesn't become a drag-start on
      // the parent <li>.
      focusBtn.addEventListener("mousedown", (e) => { e.stopPropagation(); });
      focusBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        focusBtn.classList.add("focus-btn-active");
        fetch(DAEMON_BASE + "/session/focus", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ sessionId: s.id }),
        }).then(async (r) => {
          const j = await r.json().catch(() => ({}));
          if (!r.ok || !j.ok) {
            const msg = j.error || ("focus failed (http " + r.status + ")");
            const pidSuffix = j.pid ? " — pid " + j.pid : "";
            showToast("Focus: " + msg + pidSuffix, "warn");
          }
        }).catch((err) => {
          showToast("Focus request failed: " + err.message, "warn");
        }).finally(() => {
          setTimeout(() => focusBtn.classList.remove("focus-btn-active"), 300);
        });
      });
      li.append(focusBtn);
    }
    li.append(buildStatusPill(s));
    li.title = buildCardTooltip(s);

    li.addEventListener("mousedown", () => { isMouseDownOnCard = true; });
    li.addEventListener("dragstart", (e) => {
      isDragging = true;
      li.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", s.id || "");
    });
    li.addEventListener("dragend", () => {
      isDragging = false;
      isMouseDownOnCard = false;
      li.classList.remove("dragging");
    });

    return li;
  }

  function renderGroupHeader(group, sessionCount) {
    const header = document.createElement("div");
    header.className = "group-header";
    if (group.color) header.style.setProperty("--group-color", group.color);

    const nameInput = document.createElement("span");
    nameInput.className = "name";
    nameInput.contentEditable = "true";
    nameInput.spellcheck = false;
    nameInput.textContent = group.name;
    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); nameInput.blur(); }
      if (e.key === "Escape") { e.preventDefault(); nameInput.textContent = group.name; nameInput.blur(); }
    });
    nameInput.addEventListener("blur", () => {
      const typed = nameInput.textContent.trim();
      // Re-lookup by id. The `group` captured in this closure may be orphaned
      // — a poll between the initial render and this blur replaces
      // groupsState with a fresh array, leaving the old object unreferenced.
      // Mutating the orphan loses the rename; the live groupsState entry
      // keeps the old name and the next render rebuild reverts the DOM.
      const live = groupsState.find((g) => g.id === group.id);
      if (!live) {
        // Group was deleted while the name was being edited; nothing to save.
        nameInput.textContent = "";
        return;
      }
      const newName = typed || live.name;
      const saved = typed && newName !== live.name;
      if (saved) {
        live.name = newName;
        saveGroups();
      }
      nameInput.textContent = live.name;
      // Brief visual feedback so users see that blur did something. Green for
      // a save that took, amber for revert (whitespace-only or unchanged).
      nameInput.classList.remove("flash-save", "flash-revert");
      void nameInput.offsetWidth; // force reflow so the next class add transitions
      nameInput.classList.add(saved ? "flash-save" : "flash-revert");
      setTimeout(() => nameInput.classList.remove("flash-save", "flash-revert"), 700);
    });
    header.append(nameInput);

    // Inline count — no pill background; CSS adds a "· " prefix. Visually
    // distinct from the daemon-level total-sessions pill in the status row.
    const count = document.createElement("span");
    count.className = "count";
    count.textContent = String(sessionCount);
    header.append(count);

    const actions = document.createElement("div"); actions.className = "actions";
    const delBtn = document.createElement("button");
    delBtn.className = "btn delete"; delBtn.type = "button";
    delBtn.title = "Delete this group (sessions move to Ungrouped). Click twice to confirm.";
    // Restore the armed visual state on re-renders so the 5s countdown
    // isn't visually lost if the DOM is rebuilt while armed.
    const startArmed = armedGroupIds.has(group.id);
    delBtn.textContent = startArmed ? "confirm?" : "delete";
    if (startArmed) delBtn.classList.add("armed");
    delBtn.addEventListener("click", () => {
      if (!armedGroupIds.has(group.id)) {
        armedGroupIds.add(group.id);
        delBtn.textContent = "confirm?";
        delBtn.classList.add("armed");
        setTimeout(() => {
          if (!armedGroupIds.has(group.id)) return; // already deleted
          armedGroupIds.delete(group.id);
          // The button may have been replaced by a render; find the live one.
          const live = document.querySelector(
            `.group-section[data-group-id="${CSS.escape(group.id)}"] .btn.delete`,
          );
          if (live) { live.classList.remove("armed"); live.textContent = "delete"; }
        }, TIMINGS.armedWindowMs);
        return;
      }
      armedGroupIds.delete(group.id);
      groupsState = groupsState.filter((g) => g.id !== group.id);
      // Drop pins that target the deleted group so sessions fall back to
      // their rule-based assignment (or Ungrouped) rather than getting
      // stuck on a dangling reference.
      pinsState = pinsState.filter((p) => p.groupId !== group.id);
      saveGroups();
      render();
    });
    actions.append(delBtn);
    header.append(actions);
    return header;
  }

  function renderDropZone(group, sessions) {
    const drop = document.createElement("ul");
    drop.className = "group-drop";
    if (group) drop.dataset.groupId = group.id;
    else drop.dataset.groupId = ""; // ungrouped

    if (!sessions.length) {
      drop.classList.add("empty");
      drop.textContent = group ? "drop a session here" : "no ungrouped sessions";
    } else {
      for (const s of sessions) drop.append(renderSessionCard(s));
    }

    // HTML5 dragleave fires every time the cursor crosses ANY child boundary,
    // not just when it leaves the drop zone. Counting enters minus leaves is
    // the standard way to reliably know when the cursor is actually inside
    // vs. outside the zone — without it the .drag-over class flickers as you
    // hover between cards inside a populated group.
    let dragDepth = 0;
    drop.addEventListener("dragenter", (e) => {
      e.preventDefault();
      if (dragDepth++ === 0) drop.classList.add("drag-over");
    });
    drop.addEventListener("dragover", (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
    });
    drop.addEventListener("dragleave", () => {
      if (--dragDepth <= 0) {
        dragDepth = 0;
        drop.classList.remove("drag-over");
      }
    });
    drop.addEventListener("drop", (e) => {
      e.preventDefault();
      dragDepth = 0;
      drop.classList.remove("drag-over");
      const sessionId = e.dataTransfer.getData("text/plain");
      if (!sessionId) return;
      const session = sessionsState.find((s) => s.id === sessionId);
      if (!session) return;
      const targetGroupId = drop.dataset.groupId || null;
      if (assignSessionToGroup(session, targetGroupId)) {
        saveGroups();
        render();
      }
    });

    return drop;
  }

  // Signature of everything that would change card placement / which cards exist.
  // When this stays the same across polls, we just refresh metadata text
  // in-place rather than rebuilding the DOM — so the currently-active session's
  // card isn't destroyed out from under a user's drag gesture.
  let lastStructuralSig = "";
  function structuralSignature() {
    // Use JSON.stringify over normalized tuples so separator characters
    // inside cwd/name/etc. (e.g. "C:\foo|bar") can't collide and produce a
    // false-equal signature that skips a needed re-render.
    const sSig = sessionsState
      .map((s) => [s.id, s.sessionName || "", s.cwd || ""])
      .sort((a, b) => (a[0] < b[0] ? -1 : a[0] > b[0] ? 1 : 0));
    const gSig = groupsState.map((g) => [
      g.id, g.name, g.color || "",
      g.members.map((m) => [m.key, m.value]),
    ]);
    // Pins affect bucketing independently of sessions/groups — dragging an
    // unnamed session only writes a pin, so without this tuple the sig
    // stays equal and render() takes the fast path that skips re-bucketing.
    const pSig = pinsState
      .map((p) => [p.sessionId, p.groupId === null ? "" : p.groupId])
      .sort((a, b) => (a[0] < b[0] ? -1 : a[0] > b[0] ? 1 : 0));
    // Capability flags affect per-card DOM (focus button renders only when
    // daemon.capabilities.focus is true). Include in the signature so a
    // daemon-restart-swap transition triggers a full rebuild that
    // adds/removes buttons rather than leaving stale ones.
    const cSig = !!daemonState?.capabilities?.focus;
    return JSON.stringify([sSig, gSig, pSig, cSig]);
  }

  // Render labeled stats in the daemon info row. Labels in sans-serif, values
  // in mono — less "shell prompt" than the all-mono single line it replaced.
  function renderDaemonInfo() {
    infoEl.textContent = "";
    if (!daemonState) return;
    const stats = [
      { label: "pid", value: String(daemonState.pid) },
      { label: "port", value: String(daemonState.port) },
      { label: "up",  value: fmtAge(Date.now() - new Date(daemonState.startedAt).getTime()) },
    ];
    for (const s of stats) {
      const stat = document.createElement("span"); stat.className = "stat";
      const l = document.createElement("span"); l.className = "stat-label"; l.textContent = s.label;
      const v = document.createElement("span"); v.className = "stat-value"; v.textContent = s.value;
      stat.append(l, v);
      infoEl.append(stat);
    }
    // Staleness indicator — how long since a successful poll. Reassures that
    // what's on screen is live data, not a frozen snapshot.
    if (lastPollOkAt) {
      const syncAgo = document.createElement("span");
      syncAgo.className = "sync-ago";
      const ms = Date.now() - lastPollOkAt;
      syncAgo.textContent = "synced " + (ms < 1000 ? "just now" : fmtAge(ms) + " ago");
      infoEl.append(syncAgo);
    }
  }

  function updateDaemonChrome() {
    countEl.textContent = sessionsState.length + (sessionsState.length === 1 ? " session" : " sessions");
    renderDaemonInfo();
    dotEl.classList.remove("offline");
  }

  function updateCardInPlace(s) {
    const card = groupsContainer.querySelector(`.session[data-session-id="${CSS.escape(s.id)}"]`);
    if (!card) return;
    card.classList.remove("fresh", "idle");
    card.classList.add(s.lastSeenAgoMs < TIMINGS.freshThresholdMs ? "fresh" : "idle");

    // Tooltip refresh — but NOT while the card is being hovered. Rewriting
    // `title` on an active tooltip closes and re-opens the native popup on
    // every update, causing a visible blink every 2s. Accepting slightly
    // stale uptime while hovered is a fine trade — the tooltip refreshes
    // the next time the user hovers away and back.
    if (!card.matches(":hover")) {
      card.title = buildCardTooltip(s);
    }

    // Status pill — replace in place so working/idle transitions animate.
    const oldStatus = card.querySelector(".status");
    if (oldStatus) oldStatus.replaceWith(buildStatusPill(s));

    // Locator lives inside .body now (not alongside the status pill).
    // Kept outside the structuralSignature fast-path so a cross-session
    // branch change doesn't rebuild any card and break a concurrent drag.
    const body = card.querySelector(".body");
    if (body) {
      const loc = buildLocator(s);
      let locEl = body.querySelector(":scope > .locator");
      if (loc) {
        if (!locEl) {
          locEl = document.createElement("span");
          locEl.className = "locator";
          body.appendChild(locEl); // always last child of .body
        }
        applyLocatorText(locEl, loc.text);
        locEl.title = loc.title;
        locEl.classList.toggle("detached", !!loc.detached);
      } else if (locEl) {
        locEl.remove();
      }
    }
  }

  function render() {
    updateDaemonChrome();

    // Empty state: no sessions AND no user-defined groups. Rather than show
    // a lonely "+ New group" button over nothing, display a welcoming hint
    // that explains what'll populate the dashboard.
    if (sessionsState.length === 0 && groupsState.length === 0) {
      lastStructuralSig = ""; // force full rebuild when a session joins
      groupsContainer.textContent = "";
      const state = document.createElement("div");
      state.className = "empty-state";
      const icon = document.createElement("div"); icon.className = "icon"; icon.textContent = "◇";
      const h = document.createElement("h2");
      h.textContent = "No Claude Code sessions connected";
      const p = document.createElement("p");
      p.innerHTML = 'Launch <code>claude</code> from any project and its session will appear here within a few seconds. You can organize sessions into workstreams once they arrive.';
      state.append(icon, h, p);
      groupsContainer.append(state);
      newGroupWrap.style.display = "none";
      newGroupBtn.classList.remove("primary");
      return;
    }
    newGroupWrap.style.display = "";
    // Promote "+ New group" to a primary CTA when sessions exist but no
    // groups have been created yet — gives first-time users one clear thing
    // to click. Reverts to the ghost style once any group exists.
    newGroupBtn.classList.toggle(
      "primary",
      groupsState.length === 0 && sessionsState.length > 0,
    );

    const sig = structuralSignature();
    if (sig === lastStructuralSig && groupsContainer.children.length > 0) {
      // Structure unchanged — refresh metadata text in each existing card.
      // Leaves card DOM nodes (and their drag listeners) intact.
      for (const s of sessionsState) updateCardInPlace(s);
      return;
    }

    // If the user is editing a group name, defer the structural rebuild —
    // it would rip the focused contenteditable out of the DOM and lose
    // the user's in-progress edit. The fast-path above keeps card pills
    // and "synced Xs ago" updating during the edit; structural changes
    // (new group, dropped pin, joining session) wait until blur. The
    // very next render() after blur picks them up.
    if (isEditingName()) {
      for (const s of sessionsState) updateCardInPlace(s);
      return;
    }

    lastStructuralSig = sig;

    groupsContainer.textContent = "";

    // Ensure each group has a color (assign from palette when missing).
    groupsState.forEach((g, i) => { if (!g.color) g.color = COLORS[i % COLORS.length]; });

    // Bucket sessions into groups. Resolution order per session:
    //   1. Pin — a per-session-id override written by drag-and-drop. Wins
    //      over rules so users can move one session out of a shared-cwd
    //      cohort (or force it to Ungrouped) without kicking its mates.
    //   2. sessionName rule — specific and stable across CC restarts.
    //   3. cwd rule — cohort-wide; fallback when no more-specific match.
    // Pins pointing at a deleted group fall through to rules (defensive;
    // normally group delete also strips its pins).
    const bucket = new Map();
    for (const g of groupsState) bucket.set(g.id, []);
    const ungrouped = [];
    const pinBySessionId = new Map();
    for (const p of pinsState) pinBySessionId.set(p.sessionId, p.groupId);
    const groupIds = new Set(groupsState.map((g) => g.id));
    for (const s of sessionsState) {
      let destId;
      if (pinBySessionId.has(s.id)) {
        const pinned = pinBySessionId.get(s.id);
        if (pinned === null) destId = null;         // forced Ungrouped
        else if (groupIds.has(pinned)) destId = pinned;
        else destId = resolveRuleGroupId(s);        // stale pin, fall back
      } else {
        destId = resolveRuleGroupId(s);
      }
      if (destId && bucket.has(destId)) bucket.get(destId).push(s);
      else ungrouped.push(s);
    }

    // Render each named group in order.
    for (const g of groupsState) {
      const section = document.createElement("div");
      section.className = "group-section";
      section.dataset.groupId = g.id;
      // Faint color wash: same hue as the left stripe, fading out in CSS.
      section.style.setProperty("--group-tint", hexToRgba(g.color, 0.09));
      const members = bucket.get(g.id) || [];
      section.append(renderGroupHeader(g, members.length));
      section.append(renderDropZone(g, members));
      groupsContainer.append(section);
    }

    // Ungrouped is only meaningful as a destination when either (a) we have
    // named groups you might want to move a session OUT of, or (b) there are
    // actually ungrouped sessions to display.
    if (groupsState.length > 0 || ungrouped.length > 0) {
      const uSection = document.createElement("div");
      uSection.className = "group-section";
      const uHeader = document.createElement("div"); uHeader.className = "group-header";
      uHeader.style.setProperty("--group-color", "var(--dim)");
      const uName = document.createElement("span"); uName.className = "name static";
      uName.textContent = "Ungrouped";
      uHeader.append(uName);
      const uCount = document.createElement("span"); uCount.className = "count";
      uCount.textContent = String(ungrouped.length);
      uHeader.append(uCount);
      uSection.append(uHeader);
      uSection.append(renderDropZone(null, ungrouped));
      groupsContainer.append(uSection);
    }
  }

  function renderOffline() {
    // Non-destructive: update the daemon chrome to reflect "unreachable" but
    // leave the group DOM intact so a transient fetch failure mid-drag or
    // mid-rename doesn't nuke the user's in-progress interaction. The next
    // successful poll will re-render groups with fresh state.
    dotEl.classList.add("offline");
    countEl.textContent = "daemon unreachable";
    infoEl.textContent = "check 127.0.0.1:8787";
    // Only draw the empty placeholder when we have nothing to show in the
    // first place (first-load failure). Subsequent offline ticks leave the
    // last-known groups visible.
    if (!groupsContainer.children.length) {
      const msg = document.createElement("div");
      msg.className = "session empty";
      msg.textContent = "daemon offline — no sessions to report";
      groupsContainer.append(msg);
    }
  }

  function isEditingName() {
    const a = document.activeElement;
    return !!(a && a.classList && a.classList.contains("name") && a.isContentEditable);
  }
  function isAnyDeleteArmed() {
    return !!document.querySelector(".btn.delete.armed");
  }

  async function poll() {
    if (isDragging || isMouseDownOnCard || isAnyDeleteArmed()) return;
    if (Date.now() - lastWriteAt < TIMINGS.writeSettleMs) return;
    try {
      const [sRes, gRes] = await Promise.all([
        fetch(DAEMON_BASE + "/sessions", { cache: "no-store" }),
        fetch(DAEMON_BASE + "/session-groups", { cache: "no-store" }),
      ]);
      // A drop could have mutated groupsState/pinsState locally while the
      // GET was in flight — don't stomp the optimistic state with the
      // server's pre-drop snapshot. The drop's PUT is already queued and
      // the next successful poll will reconcile.
      if (Date.now() - lastWriteAt < TIMINGS.writeSettleMs) return;
      if (!sRes.ok) throw new Error("sessions http " + sRes.status);
      const sData = await sRes.json();
      sessionsState = sData.sessions || [];
      daemonState = sData.daemon || null;
      if (gRes.ok) {
        const gData = await gRes.json();
        groupsState = Array.isArray(gData.groups) ? gData.groups : [];
        pinsState = Array.isArray(gData.pins) ? gData.pins : [];
        // Keep the rollback baseline aligned with the server's authoritative
        // view — any subsequent save failure will restore to this snapshot.
        lastSyncedGroups = JSON.stringify(groupsState);
        lastSyncedPins = JSON.stringify(pinsState);
      }
      // Detect any sessionName changes since the last poll and reconcile
      // rules + pins so renamed cards stay in their current group rather
      // than jumping to whichever other group has a stale rule for the
      // new name (or to Ungrouped if no rule matches). Saves only when
      // something actually changed.
      const renames = detectRenames();
      if (renames.length > 0) {
        let changed = false;
        for (const { session, oldName } of renames) {
          if (reconcileRenamedSession(session, oldName)) changed = true;
        }
        if (changed) saveGroups();
      }
      lastPollOkAt = Date.now();
      render();
    } catch {
      renderOffline();
    }
  }

  // Pick a group color that isn't already in use; fall back to cycling the
  // palette when every color is taken. Avoids the old bug where deleting a
  // middle group made the next new one collide with an existing color.
  function pickNewGroupColor() {
    const used = new Set(groupsState.map((g) => g.color).filter(Boolean));
    const free = COLORS.find((c) => !used.has(c));
    return free || COLORS[groupsState.length % COLORS.length];
  }

  newGroupBtn.addEventListener("click", () => {
    const newGroup = {
      id: uid(),
      name: "Group " + (groupsState.length + 1),
      color: pickNewGroupColor(),
      members: [],
    };
    groupsState.push(newGroup);
    saveGroups();
    render();
    // render() is synchronous — the section exists now, no setTimeout needed.
    const target = groupsContainer.querySelector(
      `.group-section[data-group-id="${CSS.escape(newGroup.id)}"]`,
    );
    const nameEl = target?.querySelector(".name");
    if (nameEl) {
      nameEl.focus();
      const range = document.createRange();
      range.selectNodeContents(nameEl);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }
  });

  poll();
  setInterval(poll, TIMINGS.pollIntervalMs);
})();
</script>
<script>
  // Theme cycle handler. Mirrors the algorithm in data/theme.mjs (which is
  // exercised by data/theme.test.mjs). Inlined here because Chromium blocks
  // ES module imports from file:// origins; the daemon serves /sessions and
  // /session-groups but the HTML itself is opened directly from disk.
  (() => {
    const ORDER = ["current", "dark", "light"];
    const GLYPH = { current: "◐", dark: "☾", light: "☀" };
    const LABEL = { current: "Current", dark: "Dark", light: "Light" };
    const KEY = "sessions-dashboard-theme";

    const btn = document.getElementById("theme-toggle");

    function applyTheme(choice, persist) {
      document.documentElement.setAttribute("data-theme", choice);
      document.documentElement.setAttribute("data-theme-choice", choice);
      btn.textContent = GLYPH[choice];
      btn.title = `Theme: ${LABEL[choice]} (click to cycle)`;
      btn.setAttribute("aria-label", `Theme: ${LABEL[choice]}. Click to cycle theme.`);
      // Only write on explicit user choice — initial-load defaulting must NOT
      // pollute localStorage, otherwise future versions can't change the default.
      if (persist) {
        try { localStorage.setItem(KEY, choice); } catch (_) {}
      }
    }

    btn.addEventListener("click", () => {
      const cur = document.documentElement.getAttribute("data-theme-choice") || "current";
      const i = ORDER.indexOf(cur);
      const next = i === -1 ? "dark" : ORDER[(i + 1) % ORDER.length];
      applyTheme(next, true);
    });

    applyTheme(document.documentElement.getAttribute("data-theme-choice") || "current", false);
  })();
</script>
</body>
</html>
